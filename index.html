<!-- Trigger/Open The New MtF -->
    <button id="newMtFModalButton">Generate New MtF Plan</button>

            <!-- The Modal -->
            <div id="mtfModal" class="modal">

            <!-- Modal content -->
            <div class="modal-content">
                <p>Set the date you plan to start taking hormones. Everything else can be set later.</p>
                <input type="date" id="hormoneStartDate">
                <button id="generateMtF">Generate New MtF Plan</button>
            </div>

            </div>

    <p>Upload a transition plan:</p>
    <input id="file" type="file" />
    <br>
    
    <script type="text/javascript" src="json-upload.js"></script>
    

    <div id="planEditTable"></div>

    <span class="text-needs-scheduling">Needs Scheduling</span>
    <span class="text-scheduled">Scheduled</span>
    <span class="text-tbd">TBD</span>
    <span class="text-before">Before</span>
    <span class="text-onset">Onset</span>
    <span class="text-max-effect">Max Effect</span>


    <br>
    <button  onclick="downloadJSONFile()">Download My Plan</button>
    <a id="downloadAnchorElem" style="display: none;"></a>

    <button id="downloadPng">Download Image</button>

    <script type="text/javascript" src="gantt-chart-d3.js"></script>
	<script type="text/javascript" src="transition-planner.js"></script>
